apiVersion: apps/v1
kind: Deployment
metadata:
  name: revlr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: revlr-frontend
  template:
    metadata:
      labels:
        app: revlr-frontend
    spec:
      containers:
      - name: revlr-frontend
        image: #{acrLoginServer}#/revlr:#{Build.BuildId}#
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: revlr-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: revlr-frontend