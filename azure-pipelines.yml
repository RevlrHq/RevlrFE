trigger:
    branches:
        include:
            - main
    paths:
        exclude:
            - README.md
            - .gitignore

variables:
    - group: revlr-fe-dev
    - ${{ if eq(variables['Build.SourceBranchName'], 'master') }}:
          - group: revlr-fe-production
    - ${{ if eq(variables['Build.SourceBranchName'], 'staging') }}:
          - group: revlr-fe-staging
    # Pipeline-level variables
    - name: projectName
      value: 'revlr'
    - name: environment
      value: '$(Environment)' # This will be set in the pipeline settings
    - name: azureServiceConnection
      value: '$(AzureServiceConnection)' # This will be set in the pipeline settings
    - name: resourceGroupName
      value: '$(ResourceGroupName)' # This will be set in the pipeline settings
    - name: aksClusterName
      value: '$(projectName)-$(environment)-aks'

stages:
    - stage: Build
      jobs:
          - job: BuildAndTest
            pool:
                vmImage: 'ubuntu-latest'
            steps:
                - task: NodeTool@0
                  inputs:
                      versionSpec: '18.x'
                  displayName: 'Install Node.js'

                - script: |
                      npm install -g pnpm
                      pnpm install
                  displayName: 'Install dependencies'

                - script: pnpm test
                  displayName: 'Run tests'

                - script: pnpm build
                  displayName: 'Build application'

                - task: Docker@2
                  inputs:
                      containerRegistry: '$(DockerRegistryServiceConnection)'
                      repository: '$(projectName)'
                      command: 'buildAndPush'
                      Dockerfile: '**/Dockerfile'
                      tags: |
                          $(Build.BuildId)
                          latest
                  displayName: 'Build and push Docker image'

    - stage: Infrastructure
      dependsOn: [] # Run in parallel with Build
      jobs:
          - job: DeployInfrastructure
            pool:
                vmImage: 'ubuntu-latest'
            steps:
                - task: AzureCLI@2
                  inputs:
                      azureSubscription: 'revlr-dev' # Using a literal service connection name
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                          az group create --name $(resourceGroupName) --location eastus
                  displayName: 'Create Resource Group if not exists'

                - task: AzureCLI@2
                  inputs:
                      azureSubscription: 'revlr-dev' # Using a literal service connection name
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                          az deployment group create \
                            --resource-group $(resourceGroupName) \
                            --template-file infrastructure/bicep/main.bicep \
                            --parameters environment=$(environment) projectName=$(projectName)
                  displayName: 'Deploy Bicep template'

    - stage: Deploy
      dependsOn:
          - Build
          - Infrastructure
      jobs:
          - job: DeployToAKS
            pool:
                vmImage: 'ubuntu-latest'
            steps:
                - task: KubernetesManifest@1
                  inputs:
                      action: 'deploy'
                      connectionType: 'azureResourceManager'
                      azureSubscriptionConnection: 'revlr-dev' # Using a literal service connection name
                      azureResourceGroup: '$(resourceGroupName)'
                      kubernetesCluster: '$(aksClusterName)'
                      manifests: 'infrastructure/k8s/deployment.yaml'
                      containers: '$(acrLoginServer)/$(projectName):$(Build.BuildId)'
