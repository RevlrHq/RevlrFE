trigger:
    branches:
        include:
            - master
    paths:
        exclude:
            - README.md
            - .gitignore

variables:
    - group: revlr-fe-dev
    - ${{ if eq(variables['Build.SourceBranchName'], 'master') }}:
          - group: revlr-fe-production
    - ${{ if eq(variables['Build.SourceBranchName'], 'staging') }}:
          - group: revlr-fe-staging
    # Pipeline-level variables
    - name: projectName
      value: 'revlr'
    - name: aksClusterName
      value: '$(projectName)-$(environment)-aks'
    - name: acrLoginServer
      value: '$(projectName)$(Environment).azurecr.io'

stages:
    - stage: Build
      jobs:
          - job: BuildAndTest
            pool:
                vmImage: 'ubuntu-latest'
            steps:
                - script: |
                    echo "Debugging Variables:"
                    echo "Environment: $(Environment)"
                    echo "AzureServiceConnection: $(AzureServiceConnection)"
                    echo "ResourceGroupName: $(ResourceGroupName)"
                    echo "Project Name: $(projectName)"
                    echo "AKS Cluster Name: $(aksClusterName)"
                    echo "Docker Registry Connection: $(DockerRegistryServiceConnection)"
                  displayName: 'Debug Variables'

                - task: NodeTool@0
                  inputs:
                      versionSpec: '18.x'
                  displayName: 'Install Node.js'

                - script: |
                      npm install -g pnpm
                      pnpm install
                  displayName: 'Install dependencies'

                - script: pnpm test
                  displayName: 'Run tests'

                - script: pnpm build
                  displayName: 'Build application'

                - task: Docker@2
                  inputs:
                      containerRegistry: '$(DockerRegistryServiceConnection)'
                      repository: '$(projectName)'
                      command: 'buildAndPush'
                      Dockerfile: '**/Dockerfile'
                      tags: |
                          $(Build.BuildId)
                          latest
                  displayName: 'Build and push Docker image'

                # Verify image exists in container registry
                - task: AzureCLI@2
                  inputs:
                      azureSubscription: 'revlr-dev'
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                          echo "Verifying image in Azure Container Registry..."
                          # List repositories
                          az acr repository show -n $(projectName)$(Environment)acr --repository $(projectName) --query "name"
                          # List tags for the repository
                          echo "Available tags for $(projectName):"
                          az acr repository show-tags -n $(projectName)$(Environment)acr --repository $(projectName) --orderby time_desc
                          # Get details of specific tags
                          echo "Details for latest build ($(Build.BuildId)):"
                          az acr repository show-manifests -n $(projectName)$(Environment)acr --repository $(projectName) --query "[?contains(tags, '$(Build.BuildId)')]"
                  displayName: 'Verify image in container registry'

    - stage: Infrastructure
      dependsOn: [] # Run in parallel with Build
      jobs:
          - job: DeployInfrastructure
            pool:
                vmImage: 'ubuntu-latest'
            steps:
                - task: AzureCLI@2
                  inputs:
                      azureSubscription: 'revlr-dev' # Using a literal service connection name
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                          az group create --name $(resourceGroupName) --location eastus2
                  displayName: 'Create Resource Group if not exists'

                - task: AzureCLI@2
                  inputs:
                      azureSubscription: 'revlr-dev' # Using a literal service connection name
                      scriptType: 'bash'
                      scriptLocation: 'inlineScript'
                      inlineScript: |
                          az deployment group create \
                            --resource-group $(resourceGroupName) \
                            --template-file infrastructure/bicep/main.bicep \
                            --parameters environment=$(environment) projectName=$(projectName)
                  displayName: 'Deploy Bicep template'

    - stage: Deploy
      dependsOn:
          - Build
          - Infrastructure
      jobs:
          - job: DeployToAKS
            pool:
                vmImage: 'ubuntu-latest'
            steps:
                - task: KubernetesManifest@1
                  inputs:
                      action: 'deploy'
                      connectionType: 'azureResourceManager'
                      azureSubscriptionConnection: 'revlr-dev' # Using a literal service connection name
                      azureResourceGroup: '$(resourceGroupName)'
                      kubernetesCluster: '$(aksClusterName)'
                      manifests: 'infrastructure/k8s/deployment.yaml'
                      containers: '$(acrLoginServer)/$(projectName):$(Build.BuildId)'

                # Add the debug step here
                - task: Bash@3
                  inputs:
                    targetType: 'inline'
                    script: |
                      # Wait for pods to be created
                      sleep 30
                      
                      # Get pod status
                      kubectl get pods -l app=revlr-frontend -o wide
                      
                      # Describe the deployment
                      kubectl describe deployment revlr-frontend
                      
                      # Get logs from pods
                      for pod in $(kubectl get pods -l app=revlr-frontend -o name); do
                        echo "Logs for $pod"
                        kubectl logs $pod --tail=100
                      done
                  displayName: 'Debug Kubernetes Deployment'
